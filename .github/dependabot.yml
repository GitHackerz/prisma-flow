version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      nextjs:
        patterns:
          - next
          - eslint-config-next
      test-tooling:
        patterns:
          - vitest
          - "@vitest/*"
          - "@testing-library/*"
      prisma:
        patterns:
          - prisma
          - "@prisma/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
