name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Quality gate ─────────────────────────────────────────────────────────
  quality:
    name: Typecheck + Lint + Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package first
        run: npm run build --workspace=packages/shared

      - name: Typecheck
        run: npx turbo typecheck

      - name: Lint
        run: npx turbo lint

      - name: Format / quality check
        run: npx biome check .

  # ─── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Run CLI tests
        run: npm test --workspace=packages/cli -- --reporter=verbose

      - name: Run dashboard tests
        run: npm test --workspace=packages/dashboard -- --reporter=verbose

      - name: Upload CLI coverage
        uses: actions/upload-artifact@v4
        with:
          name: cli-coverage
          path: packages/cli/coverage/
          retention-days: 7

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Build dashboard
        run: npm run build --workspace=packages/dashboard
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Build website
        run: npm run build --workspace=packages/website
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Build CLI
        run: npm run build --workspace=packages/cli

      - name: Upload CLI dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: packages/cli/dist/
          retention-days: 7
